name: kotik_ucheny
description: Котик Учёный — голосовой ИИ-тьютор для детей 5–7 лет.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_animate: ^4.2.0
  speech_to_text: ^6.5.0
  flutter_tts: ^3.8.0
  confetti: ^0.8.0
  rive: ^0.13.1
  lottie: ^2.7.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  in_app_purchase: ^3.1.11
  pdf: ^3.10.8
  path_provider: ^2.1.1
  intl: ^0.18.1
  audioplayers: ^6.1.0
  http: ^1.2.1
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_native_splash: ^2.3.9

flutter_native_splash:
  color: "#FFF8F0"
  color_dark: "#FFF8F0"
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/animations/
