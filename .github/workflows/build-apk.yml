name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name != 'push' && github.event_name != 'workflow_dispatch' }}

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android
            /usr/local/lib/android/sdk
          key: android-sdk-${{ runner.os }}-v1

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          cache: true

      - run: rm -rf android
      - run: flutter create --platforms=android --org com.catwise .
      - run: rm -f test/widget_test.dart

      - run: |
          echo 'android.newDsl=false' >> android/gradle.properties
          echo 'org.gradle.parallel=true' >> android/gradle.properties
          echo 'org.gradle.caching=true' >> android/gradle.properties
          sed -i 's/repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)/repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)/' android/settings.gradle
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 35/' android/app/build.gradle
          sed -i 's/ndkVersion = flutter.ndkVersion/ndkVersion = "25.1.8937393"/' android/app/build.gradle
          sed -i 's/id "com.android.application" version "[^"]*"/id "com.android.application" version "8.7.0"/' android/settings.gradle
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "2.1.20"/' android/settings.gradle
          sed -i 's/gradle-[0-9.]*-all.zip/gradle-8.9-all.zip/' android/gradle/wrapper/gradle-wrapper.properties
          sed -i "s/jvmTarget = JavaVersion.VERSION_1_8/jvmTarget = '1.8'/" android/app/build.gradle
          sed -i "s/jvmTarget = '11'/jvmTarget = '1.8'/" android/app/build.gradle
          cat >> android/build.gradle << 'GRADLEEOF'

          ext.kotlin_version = '2.1.20'
          GRADLEEOF

          cat >> android/app/build.gradle << 'KOTLINEOF'

          kotlin {
              compilerOptions {
                  jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_1_8)
              }
          }
          KOTLINEOF

      - name: Reinstall Android SDK platform 35 (fix corrupted jar)
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --uninstall "platforms;android-35"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-35"

      - run: |
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/drawable

          cat > android/app/src/main/res/drawable/ic_launcher_background.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#FFF8F0"
                android:pathData="M0,0h108v108h-108z"/>
            <path android:fillColor="#FFD9A0"
                android:pathData="M0,0h108v108h-108z"
                android:fillAlpha="0.3"/>
          </vector>
          XMLEOF

          cat > android/app/src/main/res/drawable/ic_launcher_foreground.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
            <group android:pivotX="54" android:pivotY="54"
                android:scaleX="0.6" android:scaleY="0.6">
              <path android:fillColor="#5D4037"
                  android:pathData="M54,20l4.5,19h18l-14.5,10.5l5.5,18l-13.5,-10l-13.5,10l5.5,-18l-14.5,-10.5h18z"/>
            </group>
          </vector>
          XMLEOF

          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@drawable/ic_launcher_background"/>
            <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          XMLEOF

      - run: flutter pub get
      - run: dart run flutter_native_splash:create

      - run: flutter test

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: kotik-ucheny-apk
          path: build/app/outputs/flutter-apk/app-release.apk
