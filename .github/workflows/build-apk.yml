name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          cache: true

      - run: rm -rf android
      - run: flutter create --platforms=android --org com.catwise .
      - run: rm -f test/widget_test.dart

      - run: |
          echo 'android.newDsl=false' >> android/gradle.properties
          sed -i 's/repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)/repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)/' android/settings.gradle

      - run: flutter pub get

      - run: flutter test

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: kotik-ucheny-apk
          path: build/app/outputs/flutter-apk/app-release.apk
